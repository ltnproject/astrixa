<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrixa Connect — Get Your API Keys</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%238b5cf6'/><stop offset='100%25' stop-color='%2306b6d4'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white' font-family='Arial' font-weight='bold'>A</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .connect-header {
      padding: 60px 24px;
      text-align: center;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }
    .connect-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .search-bar {
      max-width: 600px;
      margin: -30px auto 40px;
      position: relative;
      z-index: 10;
    }
    .provider-guide-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 32px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 32px;
      transition: all var(--transition-base);
    }
    .provider-guide-card:hover {
      border-color: var(--brand-primary);
      box-shadow: var(--shadow-lg);
    }
    .provider-guide-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: white;
    }
    .guide-content h2 {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .guide-links {
      display: flex;
      gap: 12px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .guide-steps {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
    .guide-step {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .step-number {
      width: 20px;
      height: 20px;
      background: var(--bg-tertiary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    @media (max-width: 640px) {
      .provider-guide-card { grid-template-columns: 1fr; gap: 20px; }
      .provider-guide-icon { width: 60px; height: 60px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <!-- Background Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav class="landing-nav scrolled">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">A</div>
      <span>Astrixa</span>
    </a>
    <div class="nav-actions">
      <a href="astrixa.html" class="btn btn-primary btn-sm">Back to Chat →</a>
    </div>
  </nav>

  <header class="connect-header">
    <div class="section-label" style="justify-content:center;">🔌 Astrixa Connect</div>
    <h1 class="text-4xl font-extrabold mt-4">Get Your API Keys</h1>
    <p class="text-secondary mt-4 max-w-2xl mx-auto">Follow our step-by-step guides to connect your favorite AI providers to Astrixa. Your keys stay 100% private in your browser.</p>
  </header>

  <div class="connect-container">
    <div class="search-bar">
      <div class="input-group">
        <input type="text" class="input-field glass-strong" id="provider-search" placeholder="Search providers (e.g. OpenAI, Claude, Groq)...">
        <span class="input-suffix">🔍</span>
      </div>
    </div>

    <div id="guides-list">
      <!-- Guides will be injected here via JS -->
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner text-center">
      <p class="text-tertiary">© 2026 AstrixaWorld. Privacy First AI.</p>
    </div>
  </footer>

  <script src="assets/js/providers.js"></script>
  <script src="assets/js/theme.js"></script>
  <script>
    const guidesList = document.getElementById('guides-list');
    const searchInput = document.getElementById('provider-search');

    function renderGuides(filter = '') {
      guidesList.innerHTML = '';
      const providers = Object.values(window.PROVIDERS);
      
      const filtered = providers.filter(p => 
        p.name.toLowerCase().includes(filter.toLowerCase())
      );

      if (filtered.length === 0) {
        guidesList.innerHTML = '<div class="text-center py-20 opacity-50">No providers found matching your search.</div>';
        return;
      }

      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'provider-guide-card reveal visible';
        card.id = p.id;
        
        card.innerHTML = `
          <div class="provider-guide-icon" style="background:${p.color || 'var(--brand-gradient)'}">${p.icon}</div>
          <div class="guide-content">
            <h2>${p.name}</h2>
            <p class="text-secondary text-sm">Official support for ${p.models.map(m => m.name).join(', ')}.</p>
            
            <div class="guide-links">
              <a href="${p.website}" target="_blank" class="btn btn-secondary btn-sm">Official Website</a>
              <a href="${p.apiKeyUrl}" target="_blank" class="btn btn-primary btn-sm">Get API Key</a>
              ${p.docsUrl ? `<a href="${p.docsUrl}" target="_blank" class="btn btn-ghost btn-sm">Documentation</a>` : ''}
            </div>

            <div class="guide-steps">
              <div class="guide-step">
                <div class="step-number">1</div>
                <div>Create an account on the <strong>${p.name}</strong> platform.</div>
              </div>
              <div class="guide-step">
                <div class="step-number">2</div>
                <div>Navigate to the API Keys section in your dashboard.</div>
              </div>
              <div class="guide-step">
                <div class="step-number">3</div>
                <div>Generate a new API key and copy it.</div>
              </div>
              <div class="guide-step">
                <div class="step-number">4</div>
                <div>Open <strong>Astrixa Chat</strong>, go to Settings > Astrixa Connect, and paste your key.</div>
              </div>
            </div>
            
            <div class="mt-4 p-4 glass rounded-lg">
              <div class="text-xs font-bold uppercase tracking-wider opacity-50 mb-2">Free Tier Info</div>
              <div class="text-sm">${p.id === 'groq' ? 'Groq currently offers a very generous free tier for developers.' : p.id === 'google' ? 'Google Gemini has a free tier for individual developers via AI Studio.' : 'Check the official website for the latest pricing and free tier availability.'}</div>
            </div>
          </div>
        `;
        guidesList.appendChild(card);
      });
    }

    searchInput.addEventListener('input', (e) => renderGuides(e.target.value));
    renderGuides();
  </script>
</body>
</html>
